<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Voice Translator</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #121316;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 820px;
  background: #18181d;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

h1 {
  margin-bottom: 10px;
}

.subtitle {
  color: #aaa;
  margin-bottom: 20px;
}

textarea, select {
  width: 100%;
  border: none;
  outline: none;
  border-radius: 14px;
  padding: 16px;
  font-size: 16px;
  background: #23232b;
  color: white;
  margin-bottom: 16px;
  box-sizing: border-box;
}

textarea {
  min-height: 140px;
  resize: none;
}

label {
  display: block;
  margin-bottom: 8px;
  color: #bbb;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.controls,
.outputActions {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

button {
  border: none;
  border-radius: 14px;
  padding: 14px 18px;
  font-size: 15px;
  cursor: pointer;
}

#micBtn {
  background: #ffb347;
  color: black;
  font-weight: bold;
}

#translateBtn {
  flex: 1;
  background: #2b2b35;
  color: white;
}

.secondaryBtn {
  background: #3a3a45;
  color: white;
}

.status {
  margin-top: 10px;
  color: #999;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">

  <h1>AI Voice Translator</h1>
  <div class="subtitle">
    Speak naturally → clean text + real English
  </div>

  <div class="grid">
    <div>
      <label>Style</label>
      <select id="mode">
        <option value="friendly">Friendly Talk</option>
        <option value="street">Real Talk: Slang & Swearing 🔥</option>
        <option value="formal">Formal & Professional</option>
      </select>
    </div>

    <div>
      <label>Output Format</label>
      <select id="format">
        <option value="chat">Chat Version</option>
        <option value="email">Email Version</option>
      </select>
    </div>
  </div>

  <label>Original Text</label>
  <textarea
    id="input"
    placeholder="Speak or type here..."
  ></textarea>

  <div class="controls">
    <button id="micBtn">🎤 Speak</button>
    <button id="translateBtn">Translate</button>
    <button id="clearBtn" class="secondaryBtn">Clear</button>
    <button id="copyInputBtn" class="secondaryBtn">Copy Original</button>
  </div>

  <label>English Translation</label>
  <textarea
    id="output"
    placeholder="Translation will appear here..."
    readonly
  ></textarea>

  <div class="outputActions">
    <button id="speakBtn" class="secondaryBtn">🔊 Speak Translation</button>
    <button id="copyOutputBtn" class="secondaryBtn">Copy Translation</button>
  </div>

  <div class="status" id="status">Ready</div>

</div>

<script>
const input = document.getElementById("input");
const output = document.getElementById("output");
const micBtn = document.getElementById("micBtn");
const translateBtn = document.getElementById("translateBtn");
const clearBtn = document.getElementById("clearBtn");
const copyInputBtn = document.getElementById("copyInputBtn");
const copyOutputBtn = document.getElementById("copyOutputBtn");
const speakBtn = document.getElementById("speakBtn");
const status = document.getElementById("status");
const mode = document.getElementById("mode");
const format = document.getElementById("format");

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition;
let isListening = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = "uk-UA";
  recognition.continuous = true;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    status.textContent = "Listening...";
  };

  recognition.onresult = (event) => {
    let finalText = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalText += event.results[i][0].transcript + " ";
      }
    }

    if (finalText.trim()) {
      input.value = (input.value + " " + finalText)
        .replace(/\s+/g, " ")
        .trim();

      status.textContent = "Speech captured";
    }
  };

  recognition.onerror = (event) => {
    status.textContent = "Microphone error: " + event.error;
    isListening = false;
  };

  recognition.onend = () => {
    isListening = false;
    status.textContent = "Stopped listening";
  };
}

micBtn.addEventListener("click", () => {
  if (!recognition) return;

  if (isListening) {
    recognition.stop();
  } else {
    recognition.start();
  }
});

translateBtn.addEventListener("click", async () => {
  const text = input.value.trim();

  if (!text) {
    status.textContent = "Enter text first";
    return;
  }

  status.textContent = "Translating...";
  output.value = "";

  try {
    const response = await fetch("/api/translate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text,
        mode: mode.value,
        format: format.value
      })
    });

    const data = await response.json();

    if (!response.ok) {
      status.textContent = data.error || "Translation failed";
      return;
    }

    if (data.translation) {
      output.value = data.translation;
      status.textContent = "Done";
    } else {
      status.textContent = "Translation failed";
    }

  } catch (error) {
    status.textContent = "Server error";
  }
});

clearBtn.addEventListener("click", () => {
  input.value = "";
  output.value = "";
  status.textContent = "Cleared";
});

copyInputBtn.addEventListener("click", async () => {
  await navigator.clipboard.writeText(input.value);
  status.textContent = "Original copied";
});

copyOutputBtn.addEventListener("click", async () => {
  await navigator.clipboard.writeText(output.value);
  status.textContent = "Translation copied";
});

speakBtn.addEventListener("click", () => {
  if (!output.value.trim()) {
    status.textContent = "Nothing to speak";
    return;
  }

  const utterance = new SpeechSynthesisUtterance(output.value);
  utterance.lang = "en-GB";
  utterance.rate = 1;
  utterance.pitch = 1;

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);

  status.textContent = "Playing voice...";
});
</script>

</body>
</html>
