<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Slang and Business Translator</title>

<style>
:root{
  --bg:#f4efff;
  --card:#ffffff;
  --text:#2f2a3d;
  --muted:#6d6780;
  --btn:#9a86d8;
  --btnActive:#7e68c7;
  --btnText:#ffffff;
  --border:#ddd6f7;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:14px;
}

.app{
  max-width:760px;
  margin:auto;
}

h1{
  margin:0 0 8px;
  font-size:32px;
}

.sub{
  color:var(--muted);
  margin-bottom:18px;
}

.panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  margin-bottom:16px;
}

select, textarea{
  width:100%;
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  font-size:16px;
  background:#fff;
}

textarea{
  min-height:160px;
  resize:vertical;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:12px 0;
}

button{
  border:none;
  border-radius:18px;
  padding:12px 18px;
  cursor:pointer;
  font-size:15px;
  background:var(--btn);
  color:var(--btnText);
}

button.secondary{
  background:#ece7fb;
  color:var(--text);
}

button.active{
  background:var(--btnActive);
}

.top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.hidden{
  display:none;
}

.emoji-box{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.small{
  font-size:14px;
  color:var(--muted);
}
</style>
</head>
<body>

<div class="app">

<h1>AI Slang and Business Translator</h1>
<div class="sub">
Voice, slang, business English, email, camera and real conversation translation.
</div>

<div class="top-actions">
<button class="secondary">📷 Camera</button>
<button class="secondary">💬 Dialogue</button>
<button class="secondary">🕘 History</button>
<button class="secondary">⚙ Settings</button>
</div>

<div class="panel">

<div class="row">
<select>
<option>Ukrainian</option>
<option>Russian</option>
<option>Polish</option>
</select>

<select>
<option>English UK</option>
<option>English US</option>
</select>
</div>

<div class="row">
<button class="secondary">Message</button>
<button class="secondary">Email</button>
<button class="secondary">Plain Translate</button>
</div>

<div class="row">
<button class="secondary">😊</button>
<button class="secondary">😘</button>
<button class="secondary">😂</button>
<button class="secondary">❤️</button>
<button class="secondary">xxx</button>
</div>

<div class="panel">
<h3>Input</h3>
<div class="small">Speak or type naturally.</div>
<textarea placeholder="Speak or type here..."></textarea>

<div class="row">
<button>🎤 Start recording</button>
<button>Translate</button>
</div>
</div>

<div class="panel">
<h3>Ready result</h3>
<div class="small">Copy, speak or refine the result.</div>
<textarea placeholder="Translation will appear here..."></textarea>

<div class="row">
<button class="secondary">🔊 Speak</button>
<button class="secondary">Shorter</button>
<button class="secondary">Warmer</button>
<button class="secondary">Professional</button>
<button class="secondary">Soften</button>
<button class="secondary">Regenerate</button>
</div>
</div>

</div>
</div>

</body>
</html>
