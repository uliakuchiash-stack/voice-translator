<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Translator</title>
  <style>
    :root{
      --bg:#121316;
      --card:#1A1C21;
      --card-2:#262A31;
      --text:#F5F7FA;
      --muted:#A8AFB8;
      --accent:#E8B04C;
      --btn:#313742;
      --border:rgba(255,255,255,0.08);
      --shadow:0 12px 40px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:24px;
      transition:background .25s ease,color .25s ease;
    }

    .page{
      max-width:1180px;
      margin:0 auto;
    }

    .container{
      width:100%;
      background:var(--card);
      border-radius:24px;
      padding:28px;
      box-shadow:var(--shadow);
      transition:background .25s ease;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom:18px;
    }

    h1{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.1;
    }

    .subtitle{
      color:var(--muted);
      font-size:15px;
    }

    .themeDots{
      display:flex;
      gap:10px;
      padding-top:6px;
      flex-shrink:0;
    }

    .themeDot{
      width:18px;
      height:18px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.25);
      cursor:pointer;
      transition:transform .15s ease,border-color .15s ease;
    }

    .themeDot:hover{transform:scale(1.08)}
    .themeDot.active{border-color:#fff}

    .topControls{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
      margin-bottom:18px;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) 300px;
      gap:18px;
      align-items:start;
    }

    .mainCol,
    .sideCol{
      min-width:0;
    }

    .panel{
      background:transparent;
      border-radius:18px;
    }

    label.sectionLabel{
      display:block;
      margin:0 0 8px;
      color:#d5dce4;
      font-size:14px;
      font-weight:700;
    }

    select, textarea{
      width:100%;
      border:none;
      outline:none;
      border-radius:16px;
      padding:16px;
      font-size:16px;
      background:var(--card-2);
      color:var(--text);
      transition:background .25s ease,color .25s ease;
      box-shadow:inset 0 0 0 1px var(--border);
    }

    select{
      height:56px;
    }

    textarea{
      resize:vertical;
      line-height:1.5;
      min-height:180px;
    }

    #output{
      min-height:220px;
    }

    #output.emailMode{
      min-height:320px;
    }

    .fieldBlock{
      margin-bottom:16px;
    }

    .actionRow{
      display:flex;
      gap:12px;
      align-items:center;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .actionRow .spacer{
      flex:1;
    }

    button{
      border:none;
      border-radius:16px;
      padding:14px 18px;
      font-size:15px;
      cursor:pointer;
      transition:transform .15s ease,opacity .15s ease,background .25s ease,color .25s ease;
    }

    button:hover{transform:translateY(-1px)}
    button:active{transform:translateY(0)}

    #micBtn{
      background:var(--accent);
      color:#1b1b1b;
      font-weight:700;
      min-width:120px;
    }

    #translateBtn{
      flex:1;
      background:var(--btn);
      color:var(--text);
      min-width:200px;
    }

    .secondaryBtn{
      background:var(--btn);
      color:var(--text);
    }

    .sideCard{
      background:var(--card-2);
      border-radius:18px;
      padding:16px;
      box-shadow:inset 0 0 0 1px var(--border);
      margin-bottom:14px;
    }

    .pillGroup{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .pill{
      border:none;
      border-radius:16px;
      padding:13px 14px;
      background:var(--btn);
      color:var(--text);
      cursor:pointer;
      font-size:14px;
      line-height:1.2;
      text-align:left;
      transition:transform .15s ease,background .25s ease,color .25s ease,box-shadow .25s ease;
    }

    .pill:hover{transform:translateY(-1px)}

    .pill.active{
      background:var(--accent);
      color:#1b1b1b;
      font-weight:700;
      box-shadow:0 2px 8px rgba(0,0,0,0.12);
    }

    .pillTitle{
      display:block;
      font-weight:700;
    }

    .pillSub{
      display:block;
      font-size:12px;
      opacity:.8;
      margin-top:4px;
    }

    .status{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      min-height:18px;
    }

    @media (max-width:980px){
      .layout{
        grid-template-columns:1fr;
      }

      .sideCol{
        order:-1;
      }

      .pillGroup{
        display:grid;
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width:760px){
      .topControls{
        grid-template-columns:1fr;
      }

      .pillGroup{
        grid-template-columns:1fr;
      }

      .actionRow{
        align-items:stretch;
      }

      .actionRow .spacer{
        display:none;
      }

      #translateBtn{
        min-width:unset;
      }

      .topbar{
        flex-direction:column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container">
      <div class="topbar">
        <div>
          <h1>AI Voice Translator</h1>
          <div class="subtitle">Speak naturally → clean text + real English</div>
        </div>

        <div class="themeDots" id="themeDots">
          <div class="themeDot active" data-theme="dark" style="background:#121316"></div>
          <div class="themeDot" data-theme="light" style="background:#F7F5F0"></div>
          <div class="themeDot" data-theme="rose" style="background:#F4E7E7"></div>
          <div class="themeDot" data-theme="ocean" style="background:#DCE7EF"></div>
          <div class="themeDot" data-theme="khaki" style="background:#5F6B58"></div>
        </div>
      </div>

      <div class="topControls">
        <div>
          <label class="sectionLabel" for="sourceLang">Input language</label>
          <select id="sourceLang">
            <option value="English">English</option>
            <option value="Ukrainian" selected>Ukrainian</option>
            <option value="Russian">Russian</option>
            <option value="Polish">Polish</option>
            <option value="Romanian (Romania / Moldova)">Romanian (Romania / Moldova)</option>
            <option value="Lithuanian">Lithuanian</option>
            <option value="Latvian">Latvian</option>
            <option value="Portuguese">Portuguese</option>
            <option value="Spanish">Spanish</option>
            <option value="Italian">Italian</option>
            <option value="German">German</option>
            <option value="French">French</option>
            <option value="Dutch">Dutch</option>
            <option value="Turkish">Turkish</option>
            <option value="Arabic">Arabic</option>
            <option value="Hindi">Hindi</option>
            <option value="Chinese">Chinese</option>
            <option value="Japanese">Japanese</option>
            <option value="Korean">Korean</option>
            <option value="Czech">Czech</option>
            <option value="Bulgarian">Bulgarian</option>
          </select>
        </div>

        <div>
          <label class="sectionLabel" for="targetVariant">English variant</label>
          <select id="targetVariant">
            <option value="en-US">English (US)</option>
            <option value="en-GB" selected>English (UK)</option>
          </select>
        </div>

        <div>
          <label class="sectionLabel" for="format">Output format</label>
          <select id="format">
            <option value="chat" selected>Chat Version</option>
            <option value="email">Email Version</option>
          </select>
        </div>
      </div>

      <div class="layout">
        <div class="mainCol">
          <div class="fieldBlock">
            <label class="sectionLabel" for="input">Original text</label>
            <textarea id="input" placeholder="Speak or type here..."></textarea>

            <div class="actionRow">
              <button id="micBtn">🎤 Speak</button>
              <button id="translateBtn">Translate</button>
              <div class="spacer"></div>
              <button id="clearBtn" class="secondaryBtn">Clear</button>
              <button id="copyInputBtn" class="secondaryBtn">Copy Original</button>
            </div>
          </div>

          <div class="fieldBlock">
            <label class="sectionLabel" for="output">English translation</label>
            <textarea id="output" placeholder="Translation will appear here..." readonly></textarea>

            <div class="actionRow">
              <button id="speakTranslationBtn" class="secondaryBtn">🔊 Speak Translation</button>
              <div class="spacer"></div>
              <button id="copyOutputBtn" class="secondaryBtn">Copy Translation</button>
            </div>
          </div>

          <div class="status" id="status">Ready</div>
        </div>

        <div class="sideCol">
          <div class="sideCard">
            <label class="sectionLabel">English level</label>
            <div class="pillGroup" id="levelGroup">
              <button class="pill active" data-level="elementary">
                <span class="pillTitle">Elementary</span>
                <span class="pillSub">A1–A2</span>
              </button>

              <button class="pill" data-level="everyday">
                <span class="pillTitle">Everyday</span>
                <span class="pillSub">B1–B2</span>
              </button>

              <button class="pill" data-level="advanced">
                <span class="pillTitle">Advanced</span>
                <span class="pillSub">C1–C2</span>
              </button>

              <button class="pill" data-level="native">
                <span class="pillTitle">Native</span>
              </button>
            </div>
          </div>

          <div class="sideCard">
            <label class="sectionLabel">Style</label>
            <div class="pillGroup" id="styleGroup">
              <button class="pill active" data-style="friendly">
                <span class="pillTitle">Friendly Talk</span>
              </button>

              <button class="pill" data-style="street">
                <span class="pillTitle">Real Talk: Slang &amp; Swearing 🔥</span>
              </button>

              <button class="pill" data-style="formal">
                <span class="pillTitle">Formal &amp; Professional</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const micBtn = document.getElementById("micBtn");
    const translateBtn = document.getElementById("translateBtn");
    const clearBtn = document.getElementById("clearBtn");
    const copyInputBtn = document.getElementById("copyInputBtn");
    const copyOutputBtn = document.getElementById("copyOutputBtn");
    const speakTranslationBtn = document.getElementById("speakTranslationBtn");
    const statusEl = document.getElementById("status");
    const sourceLang = document.getElementById("sourceLang");
    const targetVariant = document.getElementById("targetVariant");
    const format = document.getElementById("format");
    const themeDots = document.querySelectorAll(".themeDot");

    let selectedLevel = "elementary";
    let selectedStyle = "friendly";
    let recognition = null;
    let isListening = false;

    document.querySelectorAll("#levelGroup .pill").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#levelGroup .pill").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedLevel = btn.dataset.level;
      });
    });

    document.querySelectorAll("#styleGroup .pill").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#styleGroup .pill").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedStyle = btn.dataset.style;
      });
    });

    const themes = {
      dark: {
        "--bg":"#121316",
        "--card":"#1A1C21",
        "--card-2":"#262A31",
        "--text":"#F5F7FA",
        "--muted":"#A8AFB8",
        "--accent":"#E8B04C",
        "--btn":"#313742",
        "--border":"rgba(255,255,255,0.08)"
      },
      light: {
        "--bg":"#F7F5F0",
        "--card":"#FFFDF9",
        "--card-2":"#F1ECE3",
        "--text":"#1F2328",
        "--muted":"#6E7681",
        "--accent":"#D7A34A",
        "--btn":"#E5DED2",
        "--border":"rgba(25,35,45,0.08)"
      },
      rose: {
        "--bg":"#F4E7E7",
        "--card":"#FFF7F7",
        "--card-2":"#F0DDDD",
        "--text":"#2E2224",
        "--muted":"#7C666A",
        "--accent":"#D58B7E",
        "--btn":"#E8CFCF",
        "--border":"rgba(46,34,36,0.08)"
      },
      ocean: {
        "--bg":"#DCE7EF",
        "--card":"#F4F8FB",
        "--card-2":"#D8E4EC",
        "--text":"#22313D",
        "--muted":"#60717F",
        "--accent":"#6E9FC7",
        "--btn":"#C7D8E4",
        "--border":"rgba(34,49,61,0.08)"
      },
      khaki: {
        "--bg":"#5F6B58",
        "--card":"#6C7864",
        "--card-2":"#85917A",
        "--text":"#F5F3EC",
        "--muted":"#D8D3C6",
        "--accent":"#D6B06B",
        "--btn":"#77836F",
        "--border":"rgba(245,243,236,0.08)"
      }
    };

    function applyTheme(name) {
      const theme = themes[name];
      for (const key in theme) {
        document.documentElement.style.setProperty(key, theme[key]);
      }
      localStorage.setItem("ai_voice_theme", name);
      themeDots.forEach(dot => dot.classList.remove("active"));
      document.querySelector(`.themeDot[data-theme="${name}"]`)?.classList.add("active");
    }

    themeDots.forEach(dot => {
      dot.addEventListener("click", () => applyTheme(dot.dataset.theme));
    });

    applyTheme(localStorage.getItem("ai_voice_theme") || "dark");

    const langMap = {
      "English":"en-US",
      "Ukrainian":"uk-UA",
      "Russian":"ru-RU",
      "Polish":"pl-PL",
      "Romanian (Romania / Moldova)":"ro-RO",
      "Lithuanian":"lt-LT",
      "Latvian":"lv-LV",
      "Portuguese":"pt-PT",
      "Spanish":"es-ES",
      "Italian":"it-IT",
      "German":"de-DE",
      "French":"fr-FR",
      "Dutch":"nl-NL",
      "Turkish":"tr-TR",
      "Arabic":"ar-SA",
      "Hindi":"hi-IN",
      "Chinese":"zh-CN",
      "Japanese":"ja-JP",
      "Korean":"ko-KR",
      "Czech":"cs-CZ",
      "Bulgarian":"bg-BG"
    };

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    function buildRecognition() {
      if (!SpeechRecognition) return null;

      const r = new SpeechRecognition();
      r.lang = langMap[sourceLang.value] || "uk-UA";
      r.continuous = true;
      r.interimResults = false;

      r.onstart = () => {
        isListening = true;
        statusEl.textContent = "Listening...";
      };

      r.onresult = (event) => {
        let finalText = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalText += event.results[i][0].transcript + " ";
          }
        }

        if (finalText.trim()) {
          input.value = (input.value + " " + finalText).replace(/\s+/g, " ").trim();
          statusEl.textContent = "Speech captured";
        }
      };

      r.onerror = (event) => {
        statusEl.textContent = "Microphone error: " + event.error;
        isListening = false;
      };

      r.onend = () => {
        isListening = false;
        statusEl.textContent = "Stopped listening";
      };

      return r;
    }

    if (SpeechRecognition) {
      recognition = buildRecognition();
    } else {
      micBtn.disabled = true;
      statusEl.textContent = "Speech recognition not supported in this browser";
    }

    sourceLang.addEventListener("change", () => {
      if (isListening && recognition) recognition.stop();
      recognition = buildRecognition();
      statusEl.textContent = "Input language updated";
    });

    format.addEventListener("change", () => {
      if (format.value === "email") {
        output.classList.add("emailMode");
      } else {
        output.classList.remove("emailMode");
      }
    });

    micBtn.addEventListener("click", () => {
      if (!recognition) return;

      if (isListening) {
        recognition.stop();
        statusEl.textContent = "Stopping...";
      } else {
        recognition.start();
      }
    });

    translateBtn.addEventListener("click", async () => {
      const text = input.value.trim();

      if (!text) {
        statusEl.textContent = "Enter text first";
        return;
      }

      statusEl.textContent = "Translating...";
      output.value = "";

      try {
        const response = await fetch("/api/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            text,
            sourceLanguage: sourceLang.value,
            targetVariant: targetVariant.value,
            level: selectedLevel,
            mode: selectedStyle,
            format: format.value
          })
        });

        const data = await response.json();

        if (!response.ok) {
          statusEl.textContent = data.error || "Translation failed";
          return;
        }

        if (data.polished_source) {
          input.value = data.polished_source;
        }

        if (data.translation) {
          output.value = data.translation;
          statusEl.textContent = "Done";
        } else {
          statusEl.textContent = "Translation failed";
        }
      } catch (e) {
        statusEl.textContent = "Server error";
      }
    });

    clearBtn.addEventListener("click", () => {
      if (isListening && recognition) recognition.stop();
      input.value = "";
      output.value = "";
      statusEl.textContent = "Cleared";
    });

    copyInputBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(input.value);
        statusEl.textContent = "Original copied";
      } catch {
        statusEl.textContent = "Copy failed";
      }
    });

    copyOutputBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(output.value);
        statusEl.textContent = "Translation copied";
      } catch {
        statusEl.textContent = "Copy failed";
      }
    });

    speakTranslationBtn.addEventListener("click", () => {
      if (!output.value.trim()) {
        statusEl.textContent = "Nothing to speak";
        return;
      }

      const utterance = new SpeechSynthesisUtterance(output.value);
      utterance.lang = targetVariant.value;
      utterance.rate = 1;
      utterance.pitch = 1;

      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
      statusEl.textContent = "Playing voice...";
    });

    if (format.value === "email") {
      output.classList.add("emailMode");
    }
  </script>
</body>
</html>
