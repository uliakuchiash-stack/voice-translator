<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Voice Translator</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f12;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 760px;
  background: #18181d;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

h1 {
  margin-bottom: 10px;
}

.subtitle {
  color: #aaa;
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  color: #bbb;
  font-size: 14px;
}

select, textarea {
  width: 100%;
  border: none;
  outline: none;
  border-radius: 14px;
  padding: 16px;
  font-size: 16px;
  background: #23232b;
  color: white;
  margin-bottom: 18px;
  box-sizing: border-box;
}

textarea {
  min-height: 140px;
  resize: none;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 18px;
}

.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}

button {
  border: none;
  border-radius: 14px;
  padding: 14px 20px;
  font-size: 15px;
  cursor: pointer;
}

#micBtn {
  background: #ffb347;
  color: black;
  font-weight: bold;
}

#translateBtn {
  flex: 1;
  background: #2b2b35;
  color: white;
}

#clearBtn {
  background: #3a3a45;
  color: white;
}

#output {
  background: #111114;
}

.status {
  margin-top: 10px;
  color: #999;
  font-size: 14px;
}

@media (max-width: 700px) {
  .grid {
    grid-template-columns: 1fr;
  }

  .controls {
    flex-direction: column;
  }
}
</style>
</head>
<body>

<div class="container">
  <h1>AI Voice Translator</h1>
  <div class="subtitle">
    Speak naturally → cleaned original text + natural English translation
  </div>

  <div class="grid">
    <div>
      <label for="sourceLang">Input language</label>
      <select id="sourceLang">
        <option value="uk-UA" selected>Ukrainian</option>
        <option value="ru-RU">Russian</option>
        <option value="be-BY">Belarusian</option>
        <option value="pl-PL">Polish</option>
        <option value="es-ES">Spanish</option>
        <option value="de-DE">German</option>
        <option value="fr-FR">French</option>
        <option value="it-IT">Italian</option>
        <option value="pt-PT">Portuguese</option>
        <option value="tr-TR">Turkish</option>
        <option value="hi-IN">Hindi</option>
        <option value="ar-SA">Arabic</option>
      </select>
    </div>

    <div>
      <label for="targetVariant">English variant</label>
      <select id="targetVariant">
        <option value="en-US" selected>English (US)</option>
        <option value="en-GB">English (UK)</option>
      </select>
    </div>

    <div>
      <label for="mode">Translation mode</label>
      <select id="mode">
        <option value="natural" selected>Natural conversation</option>
        <option value="street">Street / slang</option>
        <option value="written">Writing / polished</option>
        <option value="formal">Formal</option>
      </select>
    </div>
  </div>

  <label for="input">Original text</label>
  <textarea
    id="input"
    placeholder="Speak or type here..."
  ></textarea>

  <div class="controls">
    <button id="micBtn">🎤 Speak</button>
    <button id="translateBtn">Translate</button>
    <button id="clearBtn">Clear</button>
  </div>

  <label for="output">English translation</label>
  <textarea
    id="output"
    placeholder="Translation will appear here..."
    readonly
  ></textarea>

  <div class="status" id="status">Ready</div>
</div>

<script>
const input = document.getElementById("input");
const output = document.getElementById("output");
const micBtn = document.getElementById("micBtn");
const translateBtn = document.getElementById("translateBtn");
const clearBtn = document.getElementById("clearBtn");
const status = document.getElementById("status");
const mode = document.getElementById("mode");
const sourceLang = document.getElementById("sourceLang");
const targetVariant = document.getElementById("targetVariant");

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition;
let isListening = false;

function buildRecognition() {
  if (!SpeechRecognition) return null;

  const r = new SpeechRecognition();
  r.lang = sourceLang.value;
  r.interimResults = false;
  r.continuous = true;

  r.onstart = () => {
    isListening = true;
    status.textContent = "Listening...";
  };

  r.onresult = (event) => {
    let finalText = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalText += event.results[i][0].transcript + " ";
      }
    }

    if (finalText.trim()) {
      input.value = (input.value + " " + finalText).replace(/\s+/g, " ").trim();
      status.textContent = "Speech captured";
    }
  };

  r.onerror = (event) => {
    status.textContent = "Microphone error: " + event.error;
    isListening = false;
  };

  r.onend = () => {
    isListening = false;
    status.textContent = "Stopped listening";
  };

  return r;
}

if (SpeechRecognition) {
  recognition = buildRecognition();
} else {
  micBtn.disabled = true;
  status.textContent = "Speech recognition not supported";
}

sourceLang.addEventListener("change", () => {
  if (isListening && recognition) {
    recognition.stop();
  }
  recognition = buildRecognition();
  status.textContent = "Input language updated";
});

micBtn.addEventListener("click", () => {
  if (!recognition) return;

  if (isListening) {
    recognition.stop();
    status.textContent = "Stopping...";
  } else {
    recognition.start();
  }
});

clearBtn.addEventListener("click", () => {
  if (isListening && recognition) {
    recognition.stop();
  }
  input.value = "";
  output.value = "";
  status.textContent = "Cleared";
});

translateBtn.addEventListener("click", async () => {
  const text = input.value.trim();

  if (!text) {
    status.textContent = "Enter text first";
    return;
  }

  status.textContent = "Polishing and translating...";
  output.value = "";

  try {
    const response = await fetch("/api/translate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text,
        mode: mode.value,
        sourceLanguage: sourceLang.options[sourceLang.selectedIndex].text,
        targetVariant: targetVariant.value
      })
    });

    const data = await response.json();

    if (!response.ok) {
      status.textContent = data.error || "Translation failed";
      return;
    }

    if (data.polished_source) {
      input.value = data.polished_source;
    }

    if (data.translation) {
      output.value = data.translation;
      status.textContent = "Done";
    } else {
      status.textContent = "Translation failed";
    }

  } catch (error) {
    status.textContent = "Server error";
  }
});
</script>

</body>
</html>
