<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Translator</title>
  <style>
    :root{
      --bg:#0f131a;
      --card:#141a22;
      --card-2:#1f2733;
      --text:#f4f7fb;
      --muted:#a4afbc;
      --accent:#6f95d8;
      --btn:#2a3442;
      --btn-text:#f4f7fb;
      --border:rgba(255,255,255,.08);
      --shadow:0 14px 40px rgba(0,0,0,.26);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:22px;
      transition:background .25s ease,color .25s ease;
    }

    .app{
      width:100%;
      max-width:1220px;
      margin:0 auto;
      background:var(--card);
      border-radius:26px;
      padding:28px;
      box-shadow:var(--shadow);
      transition:background .25s ease;
      border:1px solid var(--border);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      margin-bottom:22px;
    }

    h1{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.1;
      font-weight:800;
    }

    .subtitle{
      color:var(--muted);
      font-size:15px;
      line-height:1.4;
    }

    .themeDots{
      display:flex;
      gap:10px;
      padding-top:4px;
      flex-shrink:0;
    }

    .themeDot{
      width:18px;
      height:18px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.35);
      cursor:pointer;
      transition:transform .15s ease,border-color .15s ease;
    }

    .themeDot:hover{transform:scale(1.08)}
    .themeDot.active{border-color:#fff}

    .selectors{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:14px;
      margin-bottom:18px;
    }

    label{
      display:block;
      font-size:14px;
      font-weight:700;
      margin:0 0 8px;
      color:var(--text);
    }

    select,
    textarea{
      width:100%;
      border:1px solid var(--border);
      outline:none;
      border-radius:18px;
      background:var(--card-2);
      color:var(--text);
      transition:background .25s ease,color .25s ease,border-color .25s ease;
    }

    select{
      padding:16px;
      font-size:16px;
      appearance:auto;
    }

    textarea{
      padding:18px;
      font-size:18px;
      line-height:1.55;
      resize:vertical;
      min-height:185px;
      white-space:pre-wrap;
    }

    #output{
      min-height:230px;
    }

    .email-mode #output{
      min-height:360px;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 330px;
      gap:18px;
      align-items:start;
    }

    .mainPanel,
    .sidePanel{
      min-width:0;
    }

    .sideCard{
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
    }

    .sideSection + .sideSection{
      margin-top:18px;
    }

    .sectionTitle{
      font-size:14px;
      font-weight:700;
      margin:0 0 10px;
      color:var(--text);
    }

    .pillGroup{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .pill{
      border:none;
      border-radius:18px;
      padding:12px 16px;
      background:var(--btn);
      color:var(--btn-text);
      cursor:pointer;
      font-size:14px;
      line-height:1.2;
      transition:transform .15s ease,background .25s ease,color .25s ease,box-shadow .25s ease,opacity .2s ease;
      text-align:center;
      min-width:96px;
    }

    .pill:hover{transform:translateY(-1px)}
    .pill.active{
      background:var(--accent);
      color:#0f1720;
      font-weight:700;
      box-shadow:0 3px 10px rgba(0,0,0,.14);
    }

    .pill small{
      display:block;
      font-size:11px;
      opacity:.82;
      margin-top:3px;
    }

    .panelBlock{
      background:rgba(255,255,255,.02);
      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
    }

    .panelBlock + .panelBlock{
      margin-top:16px;
    }

    .blockHeader{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
    }

    .blockHeader .left{
      min-width:0;
      flex:1;
    }

    .blockHeader .right{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .blockTitle{
      margin:0;
      font-size:15px;
      font-weight:700;
    }

    .blockHint{
      margin-top:3px;
      font-size:12px;
      color:var(--muted);
    }

    .rowActions{
      display:flex;
      gap:12px;
      align-items:center;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .rowActions.split{
      justify-content:space-between;
    }

    .leftActions,
    .rightActions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    button.action{
      border:none;
      border-radius:18px;
      padding:14px 18px;
      font-size:15px;
      cursor:pointer;
      transition:transform .15s ease,opacity .15s ease,background .25s ease,color .25s ease;
    }

    button.action:hover{transform:translateY(-1px)}
    button.action:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    #micBtn{
      background:var(--accent);
      color:#0f1720;
      font-weight:700;
      min-width:140px;
    }

    #translateBtn{
      flex:1;
      min-width:220px;
      background:var(--btn);
      color:var(--btn-text);
      font-weight:700;
    }

    .secondaryBtn{
      background:var(--btn);
      color:var(--btn-text);
    }

    .status{
      margin-top:16px;
      min-height:20px;
      color:var(--muted);
      font-size:14px;
    }

    @media (max-width: 980px){
      .layout{
        grid-template-columns:1fr;
      }

      .sidePanel{
        order:-1;
      }

      .sideCard{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:18px;
      }

      .sideSection + .sideSection{
        margin-top:0;
      }
    }

    @media (max-width: 760px){
      body{padding:14px}
      .app{padding:18px}
      .selectors{
        grid-template-columns:1fr;
      }
      .topbar{
        flex-direction:column;
      }
      .sideCard{
        grid-template-columns:1fr;
      }
      .blockHeader{
        flex-direction:column;
        align-items:flex-start;
      }
      .blockHeader .right{
        justify-content:flex-start;
      }
      .rowActions.split{
        flex-direction:column;
        align-items:stretch;
      }
      .leftActions,
      .rightActions{
        width:100%;
      }
      .leftActions button,
      .rightActions button{
        flex:1;
      }
      #translateBtn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="appRoot">
    <div class="topbar">
      <div>
        <h1>AI Voice Translator</h1>
        <div class="subtitle">Speak naturally → clean text + real English</div>
      </div>

      <div class="themeDots" id="themeDots">
        <div class="themeDot active" data-theme="dark" style="background:#6f95d8"></div>
        <div class="themeDot" data-theme="olive" style="background:#90a765"></div>
        <div class="themeDot" data-theme="blue" style="background:#5d8ec0"></div>
        <div class="themeDot" data-theme="rose" style="background:#c88a91"></div>
        <div class="themeDot" data-theme="lavender" style="background:#8877b8"></div>
      </div>
    </div>

    <div class="selectors">
      <div>
        <label for="sourceLang">Input language</label>
        <select id="sourceLang">
          <option value="en">English</option>
          <option value="uk" selected>Ukrainian</option>
          <option value="ru">Russian</option>
          <option value="pl">Polish</option>
          <option value="ro">Romanian (Romania / Moldova)</option>
          <option value="lt">Lithuanian</option>
          <option value="lv">Latvian</option>
          <option value="pt">Portuguese</option>
          <option value="es">Spanish</option>
          <option value="it">Italian</option>
          <option value="de">German</option>
          <option value="fr">French</option>
          <option value="nl">Dutch</option>
          <option value="tr">Turkish</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="cs">Czech</option>
          <option value="bg">Bulgarian</option>
        </select>
      </div>

      <div>
        <label for="targetVariant">English variant</label>
        <select id="targetVariant">
          <option value="en-US">English (US)</option>
          <option value="en-GB" selected>English (UK)</option>
        </select>
      </div>

      <div>
        <label for="format">Output format</label>
        <select id="format">
          <option value="chat" selected>Chat Version</option>
          <option value="email">Email Version</option>
        </select>
      </div>
    </div>

    <div class="layout">
      <div class="mainPanel">
        <div class="panelBlock">
          <div class="blockHeader">
            <div class="left">
              <div class="blockTitle">Original text</div>
              <div class="blockHint">Speak or type in the source language.</div>
            </div>
            <div class="right">
              <button id="copyInputBtn" class="action secondaryBtn">Copy Original</button>
              <button id="clearBtn" class="action secondaryBtn">Clear</button>
            </div>
          </div>

          <textarea id="input" placeholder="Speak or type here..."></textarea>

          <div class="rowActions">
            <button id="micBtn" class="action">🎤 Start recording</button>
            <button id="translateBtn" class="action">Translate</button>
          </div>
        </div>

        <div class="panelBlock">
          <div class="blockHeader">
            <div class="left">
              <div class="blockTitle">English translation</div>
              <div class="blockHint">Chat stays compact. Email gives a full formatted letter.</div>
            </div>
          </div>

          <textarea id="output" placeholder="Translation will appear here..." readonly></textarea>

          <div class="rowActions split">
            <div class="leftActions">
              <button id="speakBtn" class="action secondaryBtn">🔊 Speak Translation</button>
            </div>
            <div class="rightActions">
              <button id="copyOutputBtn" class="action secondaryBtn">Copy Translation</button>
            </div>
          </div>
        </div>

        <div class="status" id="status">Ready</div>
      </div>

      <div class="sidePanel">
        <div class="sideCard">
          <div class="sideSection">
            <div class="sectionTitle">English level</div>
            <div class="pillGroup" id="levelGroup">
              <button class="pill active" data-level="elementary">Elementary<small>A1–A2</small></button>
              <button class="pill" data-level="everyday">Everyday<small>B1–B2</small></button>
              <button class="pill" data-level="advanced">Advanced<small>C1–C2</small></button>
              <button class="pill" data-level="native">Native</button>
            </div>
          </div>

          <div class="sideSection">
            <div class="sectionTitle">Style</div>
            <div class="pillGroup" id="styleGroup">
              <button class="pill active" data-style="friendly">Friendly Talk</button>
              <button class="pill" data-style="street">Real Talk: Slang & Swearing 🔥</button>
              <button class="pill" data-style="formal">Formal & Professional</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const appRoot = document.getElementById("appRoot");
    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const micBtn = document.getElementById("micBtn");
    const translateBtn = document.getElementById("translateBtn");
    const clearBtn = document.getElementById("clearBtn");
    const copyInputBtn = document.getElementById("copyInputBtn");
    const copyOutputBtn = document.getElementById("copyOutputBtn");
    const speakBtn = document.getElementById("speakBtn");
    const statusEl = document.getElementById("status");
    const sourceLang = document.getElementById("sourceLang");
    const targetVariant = document.getElementById("targetVariant");
    const format = document.getElementById("format");
    const themeDots = document.querySelectorAll(".themeDot");

    let selectedLevel = "elementary";
    let selectedStyle = "friendly";

    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let mediaStream = null;
    let retranslateTimer = null;

    const themes = {
      dark: {
        "--bg":"#0f131a",
        "--card":"#141a22",
        "--card-2":"#1f2733",
        "--text":"#f4f7fb",
        "--muted":"#a4afbc",
        "--accent":"#6f95d8",
        "--btn":"#2a3442",
        "--btn-text":"#f4f7fb"
      },
      olive: {
        "--bg":"#626f52",
        "--card":"#6e7d5d",
        "--card-2":"#dcd8cc",
        "--text":"#f7f4ec",
        "--muted":"#e0dacd",
        "--accent":"#90a765",
        "--btn":"#7b8969",
        "--btn-text":"#f7f4ec"
      },
      blue: {
        "--bg":"#dbe3ed",
        "--card":"#eaf0f6",
        "--card-2":"#f3f7fb",
        "--text":"#203142",
        "--muted":"#617488",
        "--accent":"#5d8ec0",
        "--btn":"#7fa1c6",
        "--btn-text":"#ffffff"
      },
      rose: {
        "--bg":"#eddfe1",
        "--card":"#f4e8ea",
        "--card-2":"#fbf3f4",
        "--text":"#4a3639",
        "--muted":"#8b7377",
        "--accent":"#c88a91",
        "--btn":"#d39aa0",
        "--btn-text":"#ffffff"
      },
      lavender: {
        "--bg":"#e4deee",
        "--card":"#ede7f5",
        "--card-2":"#f6f2fb",
        "--text":"#403755",
        "--muted":"#7b7292",
        "--accent":"#8877b8",
        "--btn":"#9b8cc6",
        "--btn-text":"#ffffff"
      }
    };

    function applyTheme(name) {
      const theme = themes[name];
      for (const key in theme) {
        document.documentElement.style.setProperty(key, theme[key]);
      }
      localStorage.setItem("ai_voice_theme", name);
      themeDots.forEach(dot => dot.classList.remove("active"));
      document.querySelector(`.themeDot[data-theme="${name}"]`)?.classList.add("active");
    }

    themeDots.forEach(dot => {
      dot.addEventListener("click", () => applyTheme(dot.dataset.theme));
    });

    applyTheme(localStorage.getItem("ai_voice_theme") || "dark");

    document.querySelectorAll("#levelGroup .pill").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#levelGroup .pill").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedLevel = btn.dataset.level;
        scheduleRetranslate();
      });
    });

    document.querySelectorAll("#styleGroup .pill").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#styleGroup .pill").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedStyle = btn.dataset.style;
        scheduleRetranslate();
      });
    });

    function updateOutputModeUI() {
      if (format.value === "email") {
        appRoot.classList.add("email-mode");
      } else {
        appRoot.classList.remove("email-mode");
      }
      scheduleRetranslate();
    }

    format.addEventListener("change", updateOutputModeUI);
    targetVariant.addEventListener("change", scheduleRetranslate);
    updateOutputModeUI();

    async function startRecording() {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];

        const mimeType = MediaRecorder.isTypeSupported("audio/webm")
          ? "audio/webm"
          : "audio/mp4";

        mediaRecorder = new MediaRecorder(mediaStream, { mimeType });

        let silenceTimer = null;
        let audioContext = null;
        let analyser = null;
        let source = null;
        let dataArray = null;
        let animationId = null;

        function stopBecauseOfSilence() {
          if (isRecording && mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
          }
        }

        function monitorSilence() {
          if (!analyser) return;

          analyser.getByteTimeDomainData(dataArray);

          let sum = 0;
          for (let i = 0; i < dataArray.length; i++) {
            const value = (dataArray[i] - 128) / 128;
            sum += value * value;
          }

          const volume = Math.sqrt(sum / dataArray.length);

          if (volume > 0.02) {
            if (silenceTimer) {
              clearTimeout(silenceTimer);
              silenceTimer = null;
            }
          } else {
            if (!silenceTimer) {
              silenceTimer = setTimeout(() => {
                stopBecauseOfSilence();
              }, 1800);
            }
          }

          animationId = requestAnimationFrame(monitorSilence);
        }

        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = async () => {
          try {
            if (silenceTimer) clearTimeout(silenceTimer);
            if (animationId) cancelAnimationFrame(animationId);
            if (audioContext) await audioContext.close();

            statusEl.textContent = "Transcribing...";

            const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || "audio/webm" });
            const arrayBuffer = await blob.arrayBuffer();

            const response = await fetch("/api/transcribe", {
              method: "POST",
              headers: {
                "Content-Type": blob.type || "audio/webm",
                "x-source-language": sourceLang.value
              },
              body: arrayBuffer
            });

            const data = await response.json();

            if (!response.ok) {
              statusEl.textContent = data.error || "Transcription failed";
              return;
            }

            const transcribed = (data.text || "").trim();

            if (!transcribed) {
              statusEl.textContent = "No speech detected";
              return;
            }

            input.value = input.value
              ? `${input.value.trim()} ${transcribed}`.replace(/\s+/g, " ").trim()
              : transcribed;

            statusEl.textContent = "Speech captured";
            await runTranslate();
          } catch (error) {
            statusEl.textContent = "Transcription failed";
          } finally {
            if (mediaStream) {
              mediaStream.getTracks().forEach(track => track.stop());
              mediaStream = null;
            }
            isRecording = false;
            micBtn.textContent = "🎤 Start recording";
          }
        };

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        source = audioContext.createMediaStreamSource(mediaStream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        dataArray = new Uint8Array(analyser.fftSize);
        source.connect(analyser);

        mediaRecorder.start();
        isRecording = true;
        micBtn.textContent = "⏹ Stop recording";
        statusEl.textContent = "Recording...";

        monitorSilence();
      } catch (error) {
        statusEl.textContent = "Microphone access denied";
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
      }
      isRecording = false;
      micBtn.textContent = "🎤 Start recording";
    }

    micBtn.addEventListener("click", async () => {
      if (isRecording) {
        stopRecording();
      } else {
        await startRecording();
      }
    });

    async function runTranslate() {
      const text = input.value.trim();

      if (!text) {
        statusEl.textContent = "Enter text first";
        return;
      }

      translateBtn.disabled = true;
      statusEl.textContent = "Translating...";
      output.value = "";

      try {
        const response = await fetch("/api/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            text,
            sourceLanguage: sourceLang.options[sourceLang.selectedIndex].text,
            targetVariant: targetVariant.value,
            level: selectedLevel,
            mode: selectedStyle,
            format: format.value
          })
        });

        const data = await response.json();

        if (!response.ok) {
          statusEl.textContent = data.error || "Translation failed";
          return;
        }

        if (data.translation) {
          output.value = data.translation;
          statusEl.textContent = "Done";
        } else {
          statusEl.textContent = "Translation failed";
        }
      } catch (error) {
        statusEl.textContent = "Server error";
      } finally {
        translateBtn.disabled = false;
      }
    }

    function scheduleRetranslate() {
      if (!input.value.trim() || !output.value.trim()) return;

      clearTimeout(retranslateTimer);
      retranslateTimer = setTimeout(() => {
        runTranslate();
      }, 300);
    }

    translateBtn.addEventListener("click", runTranslate);

    clearBtn.addEventListener("click", () => {
      if (isRecording) {
        stopRecording();
      }
      input.value = "";
      output.value = "";
      statusEl.textContent = "Cleared";
    });

    copyInputBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(input.value);
        statusEl.textContent = "Original copied";
      } catch {
        statusEl.textContent = "Could not copy original";
      }
    });

    copyOutputBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(output.value);
        statusEl.textContent = "Translation copied";
      } catch {
        statusEl.textContent = "Could not copy translation";
      }
    });

    speakBtn.addEventListener("click", () => {
      if (!output.value.trim()) {
        statusEl.textContent = "Nothing to speak";
        return;
      }

      const utterance = new SpeechSynthesisUtterance(output.value);
      utterance.lang = targetVariant.value;
      utterance.rate = 1;
      utterance.pitch = 1;

      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
      statusEl.textContent = "Playing voice...";
    });
  </script>
</body>
</html>
