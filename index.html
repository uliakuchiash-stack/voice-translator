<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice Translator</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f12;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 700px;
  background: #18181d;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

h1 {
  margin-bottom: 10px;
}

.subtitle {
  color: #aaa;
  margin-bottom: 25px;
}

textarea {
  width: 100%;
  min-height: 140px;
  border: none;
  outline: none;
  resize: none;
  border-radius: 14px;
  padding: 18px;
  font-size: 16px;
  background: #23232b;
  color: white;
  margin-bottom: 20px;
}

.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}

button {
  border: none;
  border-radius: 14px;
  padding: 14px 20px;
  font-size: 15px;
  cursor: pointer;
}

#micBtn {
  background: #ffb347;
  color: black;
  font-weight: bold;
}

#translateBtn {
  flex: 1;
  background: #2b2b35;
  color: white;
}

#output {
  background: #111114;
}

.status {
  margin-top: 10px;
  color: #999;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">
  <h1>AI Voice Translator</h1>
  <div class="subtitle">
    Speak Ukrainian → Natural English Translation
  </div>

  <textarea
    id="input"
    placeholder="Speak or type Ukrainian text here..."
  ></textarea>

  <div class="controls">
    <button id="micBtn">🎤 Speak</button>
    <button id="translateBtn">Translate</button>
  </div>

  <textarea
    id="output"
    placeholder="Translation will appear here..."
    readonly
  ></textarea>

  <div class="status" id="status">
    Ready
  </div>
</div>

<script>
const input = document.getElementById("input");
const output = document.getElementById("output");
const micBtn = document.getElementById("micBtn");
const translateBtn = document.getElementById("translateBtn");
const status = document.getElementById("status");

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = "uk-UA";
  recognition.interimResults = false;
  recognition.continuous = false;

  recognition.onstart = () => {
    status.textContent = "Listening...";
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    input.value = text;
    status.textContent = "Speech captured";
  };

  recognition.onerror = () => {
    status.textContent = "Microphone error";
  };

  recognition.onend = () => {};
} else {
  micBtn.disabled = true;
  status.textContent = "Speech recognition not supported";
}

micBtn.addEventListener("click", () => {
  if (recognition) {
    recognition.start();
  }
});

translateBtn.addEventListener("click", async () => {
  const text = input.value.trim();

  if (!text) {
    status.textContent = "Enter text first";
    return;
  }

  status.textContent = "Translating...";
  output.value = "";

  try {
    const response = await fetch("/api/translate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    const data = await response.json();

    if (data.translation) {
      output.value = data.translation;
      status.textContent = "Done";
    } else {
      status.textContent = data.error || "Translation failed";
    }
  } catch (error) {
    status.textContent = "Server error";
  }
});
</script>

</body>
</html>
